    - 同梱
    - 同梱版
    - セット
    - まとめ
    # Download / code, not a physical card
    - ダウンロード版
    - DL版
    # bare コード intentionally omitted: bonus DL codes often ship with standard
    # physical copies -- see clean_market_data.py (コードのみ is kept for FF7)

ff7r_intergrade_ps5:
  game_id: ff7r_intergrade_ps5
  canonical_title: FINAL FANTASY VII REMAKE INTERGRADE
  platform: PS5
  release_date: "2021-06-10"
  publisher: SQUARE ENIX
  edition_scope: standard_only
  # Every keyword is anchored on "INTERGRADE / インターグレード". This is the main
  # config lever against FF7 contamination: Mercari then returns Intergrade
  # listings and naturally omits REMAKE(base) / REBIRTH / CRISIS CORE / REUNION.
  search_keywords:
    - FF7 リメイク インターグレード
    - FF7R インターグレード
    - ファイナルファンタジーVII リメイク インターグレード
    - FINAL FANTASY VII REMAKE INTERGRADE
    - インターグレード PS5
  exclude_keywords:
    # Limited / collector / deluxe editions
    - 限定版
    - 限定
    - コレクターズ
    - コレクターズエディション
    - デラックス
    - デラックスエディション
    - 特装版
    - 豪華版
    # Bundles / sets (pre-order bonus terms are intentionally omitted: they
    # appear on ordinary standard copies -- see clean_market_data.py)
    - 同梱
    - 同梱版
    - セット
    - まとめ
    # Download / code, not a physical disc
    - ダウンロード版
    - DL版
    # bare コード intentionally omitted: bonus DL codes often ship with standard
    # physical copies -- see clean_market_data.py (コードのみ is kept for FF7)
    # Related FF7 titles that contaminate the keyword space (different games)
    - リバース
    - REBIRTH
    - リユニオン
    - REUNION
    - クライシスコア
    - クライシス コア
    - CRISIS CORE
    # Non-game media / partial listings
    - 攻略本
    - ガイドブック
    - 設定資料集
    - サントラ
    - サウンドトラック
    # Non-game merchandise that shares the game's title (goods, not the disc/card)
    - ぬいぐるみ
    - フィギュア
    - PLAY ARTS
    - タンブラー
    - クリアファイル
    - ポストカード
    - カードケース
    - ファミ通
    - アクリル
    - キーホルダー
    - 特典のみ
    - コードのみ

