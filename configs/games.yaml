    - 特装版
    - 豪華版
    # Bundles / sets
    - 同梱
    - 同梱版
    - セット
    - まとめ
    # Download / code, not a physical disc
    - ダウンロード版
    - DL版
    # Sibling Dragon Quest titles / spin-offs that share the "ドラゴンクエスト" space
    - ビルダーズ
    - モンスターズ
    - ヒーローズ
    - トレジャーズ
    - タクト
    - ウォーク
    # Non-game media / partial listings
    - 攻略本
    - ガイドブック
    - 設定資料集
    - サントラ
    - サウンドトラック
    # Non-game merchandise sharing the title (goods, not the disc/card)
