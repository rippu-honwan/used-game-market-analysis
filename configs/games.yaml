# Game targets for the Mercari second-hand market analysis.
#
# Each top-level key is one game+platform target ("game_id").
# Add new games by copying an entry and editing the fields.
# The scraper and DB are keyed on game_id, so keep them unique.

pragmata_ps5:
  game_id: pragmata_ps5
  canonical_title: PRAGMATA
  platform: PS5
  release_date: "2026-04-24"
  publisher: CAPCOM
  edition_scope: standard_only
  search_keywords:
    - プラグマタ
    - PRAGMATA
    - プラグマタ PS5
  exclude_keywords:
    # Limited / collector / deluxe editions
    - 限定版
    - 限定
    - コレクターズ
    - コレクターズエディション
    - デラックス
    - デラックスエディション
    - 特装版
    - 豪華版
    # Bundles / sets (pre-order bonus terms are intentionally omitted: they
    # appear on ordinary standard copies -- see clean_market_data.py)
    - 同梱
    - 同梱版
    - セット
    - まとめ
    # Download / code, not a physical disc/card
    - ダウンロード版
    - DL版
    # bare コード intentionally omitted: bonus DL codes often ship with standard
    # physical copies -- see clean_market_data.py (コードのみ is kept for FF7)

